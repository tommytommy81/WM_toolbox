# FILTERING PARAMETERS (used only if preprocessing is needed)
filtering:
  min_freq: 4                                # High-pass filter frequency (Hz)
  max_freq: 80                               # Low-pass filter frequency (Hz)
  notch_freq: 50                             # Notch filter frequency (Hz) for line noise
  n_jobs: 7                                  # Number of parallel jobs for filtering

# ICA PARAMETERS (used only if preprocessing is needed)
ica:
  n_components: 40                           # Number of ICA components
  random_state: 97                           # Random state for reproducibility
  max_iter: 800                              # Maximum iterations for ICA convergence

# EPOCHING PARAMETERS
epoching:
  tmin: -4.0                                 # Start time before event (seconds)
  tmax: 3.5                                  # End time after event (seconds)
  reject_criteria:
    grad: 3000e-13                           # Rejection threshold for gradiometers (3000 fT/cm)
  flat_criteria:
    grad: 1e-13                              # Flat detection threshold (1 fT/cm)
  baseline: null                             # Baseline period [start, end] or null for no baseline

# TIME-FREQUENCY ANALYSIS PARAMETERS
time_frequency:
  min_freq_log: 0.60206                      # log10(4) - minimum frequency
  max_freq_log: 1.90309                      # log10(80) - maximum frequency
  freq_resolution: 30                        # Number of frequencies
  n_cycles: 5                                # Number of cycles for Morlet wavelets
  decim: 20                                  # Decimation factor for time points
  mode: 'logratio'                           # Baseline mode: 'logratio', 'ratio', 'zscore', 'mean', etc.
  
# TIME WINDOW OF INTEREST FOR ANALYSIS
time_window:
  tmin: 0.0                                  # Start time of interest (seconds)
  tmax: 3.0                                  # End time of interest (seconds)

# BASELINE PERIOD FOR TIME-FREQUENCY ANALYSIS
baseline:
  tmin: -3.5                                 # Start of baseline (null = no baseline)
  tmax: -0.5                                 # End of baseline

# CSD (Cross-Spectral Density) PARAMETERS
csd:
  baseline_tmin: -3.5                        # Start of baseline for CSD
  baseline_tmax: -0.5                        # End of baseline for CSD
  picks: ['meg']                             # Channel types to pick for CSD

# GROUP STATISTICS PARAMETERS
statistics:
  num_subjects: 3                           # Number of subjects in group analysis
  ch_type: 'grad'                            # Channel type for statistics
  alpha: 0.05                                # Significance level
  threshold: 0.01                            # P-value threshold for cluster formation
  n_permutations: 5000                       # Number of permutations for cluster test
  tail: 0                                    # Test tail: 0 (two-tailed), 1 (one-tailed greater), -1 (one-tailed less)
  out_type: 'mask'                           # Output type: 'mask' or 'indices'

# FOOOF (Fitting Oscillations & One-Over-F) PARAMETERS
fooof:
  freq_range: [4, 80]                        # Frequency range for FOOOF fitting

# FIGURE EXPORT PARAMETERS
figures:
  dpi: 300                                   # Resolution for saved figures
  labelsize: 4                               # Size of axis labels
  titlesize: 4                               # Size of titles
  fontsize: 4                                # General font size
  fontfamily: 'sans-serif'                   # Font family
  
# PROCESSING OPTIONS
processing:
  skip_preprocessing: true                   # Set to true if data is already preprocessed
  skip_ica: true                             # Set to true to skip ICA
  skip_visual_inspection: true               # Set to true to skip all plotting
  n_jobs: 7                                  # Number of parallel jobs for computation


# Source space parameters
source_space: 
  spacing: 'ico4'                    # Source space decimation: 'ico4', 'ico5', 'oct6'
  surfaces: 'white'                  # Brain surface: 'white', 'pial'
  orientation: 'coronal'               # Slice orientation for visualization
    
    
# Forward model parameters
forward_model:
  conductivity: [0.3]                # BEM conductivity (single shell)
  ico: 5                              # BEM surface decimation
  mindist: 5.0                  # Minimum distance from inner skull (mm)
  surfaces: 'white'                  # Surface for source space
  coord_frame: 'mri'                   # Coordinate frame: 'mri' or 'head'
    
    
# Source estimate parameters
source_estimate: 
  freq_min: 8                         # Minimum frequency (Hz)
  freq_max: 12                        # Maximum frequency (Hz)
  orientation: 'fix'                  # Orientation constraint: 'fix', 'free', 'loose'
  surf_ori: True                     # Orient dipoles perpendicular to cortex
  force_fixed: True                  # Force fixed orientation
  reg: 0.05                          # Regularization parameter
  depth: 1.0                         # Depth weighting
  method: 'single'                    # Inversion method: 'single', 'matrix'

    
# Visualization parameters
visualization:
  hemi: 'both'                     # Hemisphere: 'lh', 'rh', 'both'
  surface: 'inflated'                # Surface type: 'inflated', 'pial', 'white'
  views: ['dorsal', 'lateral', 'medial', 'ventral']  # View angles